AutoName: Offline Currency Converter
Summary: Privacy-focused currency converter that works offline

Description: |
  Offline Currency Converter is a privacy-focused currency converter app
  that works offline. Sync exchange rates from the free Frankfurter API and
  convert currencies even when you're not connected to the internet.

  Features:
   - Works completely offline
   - Supports 160+ currencies
   - Automatic exchange rate sync
   - Recent conversion history
   - Material Design 3 interface

  This app is free and open source (AGPLv3).

RepoType: git
Repo: https://github.com/anomalyco/offline-currency-converter

Builds:
  - versionName: 0.1.0
    versionCode: 1
    subdir: app
    gradle:
      - yes
    build:
      - ./gradlew assembleRelease

